<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Healthy Food Access - DC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; }
      
      #navbar {
        position: absolute;
        top: 10px;
        left: 10px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        z-index: 1000;
      }
      
      #navbar h2 { margin-bottom: 10px; color: #2c5f2d; }
      
      #navbar a {
        display: block;
        padding: 8px 12px;
        margin: 5px 0;
        background: #f0f0f0;
        text-decoration: none;
        border-radius: 4px;
        color: #333;
      }
      
      #navbar a:hover {
        background: #e0e0e0;
      }
      
      #map { height: 100vh; width: 100%; }
      
      .store-popup {
        font-family: Arial, sans-serif;
      }
      
      .store-popup h3 {
        margin-bottom: 8px;
        color: #2c5f2d;
        font-size: 16px;
      }
      
      .store-popup p {
        font-size: 13px;
        margin: 4px 0;
      }
      
      .snap-badge, .wic-badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: bold;
        margin-right: 5px;
      }
      
      .snap-badge {
        background: #d4edda;
        color: #155724;
      }
      
      .wic-badge {
        background: #cfe2ff;
        color: #084298;
      }
    </style>
  </head>
  <body>
    <div id="navbar">
      <h2>Healthy Food Access</h2>
      <a href="/">Home</a>
      <a href="/map">Map</a>
    </div>
    
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map('map').setView([38.8951, -77.0369], 12);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      fetch('/api/stores')
        .then((res) => res.json())
        .then((data) => {
          L.geoJSON(data, {
            pointToLayer: (feature, latlng) => {
              return L.circleMarker(latlng, {
                radius: 7,
                fillColor: '#2c5f2d',
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
              });
            },
            onEachFeature: (feature, layer) => {
              const props = feature.properties;
              
              const popup = `
                <div class="store-popup">
                  <h3>${props.name}</h3>
                  <p><strong>Address:</strong><br/>${props.address}</p>
                  <p><strong>Zip:</strong> ${props.zipcode} | <strong>Ward:</strong> ${props.ward}</p>
                  <div style="margin-top: 8px;">
                    ${props.snapMatch ? '<span class="snap-badge">SNAP Match</span>' : ''}
                    ${props.wicVendor ? '<span class="wic-badge">WIC Vendor</span>' : ''}
                  </div>
                </div>
              `;
              layer.bindPopup(popup);
            }
          }).addTo(map);
        });
    </script>
  </body>
</html>
