<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Healthy Food Access - DC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; }
      
      .navbar {
        background: white;
        padding: 15px 20px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .navbar-brand { color: #2c5f2d; font-weight: bold; font-size: 18px; }
      
      .navbar-links a {
        color: #2c5f2d;
        text-decoration: none;
        margin-left: 20px;
      }
      
      .navbar-links a:hover { text-decoration: underline; }
      
      #sidebar {
        position: absolute;
        top: 70px;
        left: 10px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        z-index: 1000;
        max-width: 280px;
        max-height: 500px;
        overflow-y: auto;
      }
      
      .sidebar-title { font-weight: bold; color: #2c5f2d; margin-bottom: 15px; }
      
      .filter-group { margin-bottom: 15px; }
      .filter-label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
      
      input[type="text"], select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin-bottom: 5px;
      }
      
      .action-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .action-buttons a {
        display: block;
        padding: 8px;
        background: #2c5f2d;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        text-align: center;
        font-size: 14px;
      }
      
      .action-buttons a:hover { background: #1e4620; }
      
      #map { height: calc(100vh - 60px); width: 100%; }
      
      .store-popup { font-family: Arial, sans-serif; }
      .store-popup h3 { color: #2c5f2d; margin-bottom: 8px; }
      .store-popup p { font-size: 13px; margin: 4px 0; }
      
      .popup-button {
        display: block;
        margin-top: 10px;
        padding: 8px;
        background: #2c5f2d;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        text-align: center;
        font-size: 14px;
      }
      
      .popup-button:hover { background: #1e4620; }
      
      .badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: bold;
        margin-right: 5px;
      }
      
      .snap-badge {
        background: #d4edda;
        color: #155724;
      }
      
      .wic-badge {
        background: #cfe2ff;
        color: #084298;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="navbar-brand">Healthy Food Access</div>
      <div class="navbar-links">
        <a href="/">Home</a>
        <a href="/profile">Profile</a>
      </div>
    </div>
    
    <div id="sidebar">
      <div class="sidebar-title">🔍 Search & Filter</div>
      
      <div class="filter-group">
        <label class="filter-label">Search Stores</label>
        <input type="text" id="searchInput" placeholder="Store name..." />
      </div>
      
      <div class="filter-group">
        <label class="filter-label">
          <input type="checkbox" id="filterSnap"> SNAP Match
        </label>
        <label class="filter-label">
          <input type="checkbox" id="filterWic"> WIC Vendor
        </label>
      </div>
      
      <div class="action-buttons">
        <a href="/add-store">+ Add Store</a>
      </div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map('map').setView([38.8951, -77.0369], 12);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
      
      let allStores = [];
      let geoJsonLayer = null;
      
      function updateMap() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterSnap = document.getElementById("filterSnap").checked;
        const filterWic = document.getElementById("filterWic").checked;
        
        const filtered = allStores.filter(store => {
          const name = store.properties.name.toLowerCase();
          const matchesSearch = name.includes(searchTerm) || searchTerm === "";
          const matchesSnap = !filterSnap || store.properties.snapMatch;
          const matchesWic = !filterWic || store.properties.wicVendor;
          return matchesSearch && matchesSnap && matchesWic;
        });
        
        if (geoJsonLayer) map.removeLayer(geoJsonLayer);
        
        const geojson = {
          type: "FeatureCollection",
          features: filtered
        };
        
        geoJsonLayer = L.geoJSON(geojson, {
          pointToLayer: (feature, latlng) => {
            const color = feature.properties.userAdded ? '#ff6b6b' : '#2c5f2d';
            return L.circleMarker(latlng, {
              radius: 8,
              fillColor: color,
              color: '#fff',
              weight: 2,
              opacity: 1,
              fillOpacity: 0.8
            });
          },
          onEachFeature: (feature, layer) => {
            const props = feature.properties;
            const popup = `
              <div class="store-popup">
                <h3>${props.name}</h3>
                <p><strong>Address:</strong><br/>${props.address}</p>
                <p><strong>Zip:</strong> ${props.zipcode || 'N/A'} | <strong>Ward:</strong> ${props.ward || 'N/A'}</p>
                <div>
                  ${props.snapMatch ? '<span class="badge snap-badge">SNAP Match</span>' : ''}
                  ${props.wicVendor ? '<span class="badge wic-badge">WIC Vendor</span>' : ''}
                </div>
                <a href="/store-detail?id=${feature.properties.storeId}" class="popup-button">View Details</a>
              </div>
            `;
            layer.bindPopup(popup);
          }
        }).addTo(map);
      }
      
      fetch('/api/stores')
        .then((res) => res.json())
        .then((data) => {
          allStores = data.features;
          updateMap();
        });
      
      document.getElementById("searchInput").addEventListener("input", updateMap);
      document.getElementById("filterSnap").addEventListener("change", updateMap);
      document.getElementById("filterWic").addEventListener("change", updateMap);
    </script>
  </body>
</html>
