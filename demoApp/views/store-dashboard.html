<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Store Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; background: #f5f5f5; }
      
      .navbar {
        background: white;
        padding: 15px 20px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .navbar-brand { color: #2c5f2d; font-weight: bold; font-size: 18px; }
      
      .navbar-links {
        display: flex;
        gap: 20px;
        align-items: center;
      }
      
      .navbar-links a {
        color: #2c5f2d;
        text-decoration: none;
      }
      
      .navbar-links a:hover { text-decoration: underline; }
      
      .navbar-links button {
        background: #ff6b6b;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
      }
      
      .navbar-links button:hover { background: #ff5252; }
      
      .container {
        max-width: 1000px;
        margin: 30px auto;
        padding: 0 20px;
      }
      
      h1 { color: #2c5f2d; margin-bottom: 10px; }
      .store-name { color: #666; margin-bottom: 30px; font-size: 16px; }
      
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      
      .stat-card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      }
      
      .stat-label { color: #666; font-size: 14px; }
      .stat-value { color: #2c5f2d; font-size: 32px; font-weight: bold; margin-top: 10px; }
      
      .section {
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        margin-bottom: 30px;
      }
      
      .section-title { 
        font-size: 20px; 
        font-weight: bold; 
        color: #2c5f2d; 
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .add-btn {
        display: inline-block;
        padding: 10px 20px;
        background: #2c5f2d;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        border: none;
        cursor: pointer;
      }
      
      .add-btn:hover { background: #1e4620; }
      
      .product-item {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .product-info h4 { color: #333; margin-bottom: 5px; }
      .product-info p { color: #666; font-size: 14px; }
      
      .allergens {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      
      .allergen-tag {
        background: #ffebee;
        color: #c62828;
        padding: 3px 8px;
        border-radius: 12px;
        font-size: 12px;
      }
      
      .delete-btn {
        background: #ff6b6b;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
      }
      
      .delete-btn:hover { background: #ff5252; }
      
      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="navbar-brand">🏪 Store Dashboard</div>
      <div class="navbar-links">
        <a href="/map">View Map</a>
        <button onclick="signOut()">Sign Out</button>
      </div>
    </div>
    
    <div class="container">
      <h1 id="storeName"></h1>
      <p class="store-name">📍 <span id="storeEmail"></span></p>
      
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total Products</div>
          <div class="stat-value" id="productCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Store Status</div>
          <div class="stat-value" style="font-size: 24px; color: #4caf50;">✓ Active</div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">
          <span>Products</span>
          <a href="#" class="add-btn" onclick="addProduct(); return false;">+ Add Product</a>
        </div>
        
        <div id="loading" class="loading">Loading products...</div>
        <div id="productsList" style="display: none;"></div>
      </div>
    </div>

    <script>
      const storeOwnerId = localStorage.getItem("storeOwnerId");
      if (!storeOwnerId) window.location.href = "/store-signin";
      
      let storeData = null;
      
      function addProduct() {
        const storeId = storeData._id;
        window.location.href = `/add-product?storeId=${storeId}`;
      }
      
      function deleteProduct(productId) {
        if (!confirm("Delete this product?")) return;
        
        fetch(`/api/products/${productId}`, { method: "DELETE" })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) loadProducts();
          });
      }
      
      function loadStore() {
        fetch(`/api/store-owner/${storeOwnerId}`)
          .then((res) => res.json())
          .then((data) => {
            if (data.error) {
              window.location.href = "/store-signin";
              return;
            }
            
            storeData = data.store;
            document.getElementById("storeName").textContent = data.storeName;
            document.getElementById("storeEmail").textContent = data.email;
            
            loadProducts();
          });
      }
      
      function loadProducts() {
        fetch(`/api/store-owner/${storeOwnerId}/products`)
          .then((res) => res.json())
          .then((products) => {
            document.getElementById("productCount").textContent = products.length;
            document.getElementById("loading").style.display = "none";
            document.getElementById("productsList").style.display = "block";
            
            if (products.length === 0) {
              document.getElementById("productsList").innerHTML = '<p style="text-align: center; color: #999;">No products yet. Click + Add Product to get started!</p>';
              return;
            }
            
            document.getElementById("productsList").innerHTML = products.map(p => `
              <div class="product-item">
                <div class="product-info">
                  <h4>${p.name}</h4>
                  ${p.price ? `<p>Price: $${p.price.toFixed(2)}</p>` : ''}
                  ${p.allergens && p.allergens.length > 0 ? `
                    <div class="allergens">
                      ${p.allergens.map(a => `<span class="allergen-tag">${a}</span>`).join('')}
                    </div>
                  ` : ''}
                </div>
                <button class="delete-btn" onclick="deleteProduct('${p._id}')">Delete</button>
              </div>
            `).join('');
          });
      }
      
      function signOut() {
        localStorage.removeItem("storeOwnerId");
        window.location.href = "/";
      }
      
      loadStore();
    </script>
  </body>
</html>
