<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Healthy Food Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: Arial, sans-serif; 
        background: linear-gradient(135deg, #2c5f2d 0%, #1e4620 100%);
        min-height: 100vh;
        padding: 20px;
      }
      
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      
      .hero {
        background: white;
        padding: 60px 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        text-align: center;
        margin-bottom: 30px;
      }
      
      h1 {
        color: #2c5f2d;
        margin-bottom: 15px;
        font-size: 40px;
      }
      
      .subtitle {
        color: #666;
        margin-bottom: 40px;
        font-size: 18px;
      }
      
      .sections {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
      }
      
      .card {
        background: white;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      }
      
      .card h2 {
        color: #2c5f2d;
        margin-bottom: 25px;
        font-size: 24px;
        border-bottom: 2px solid #2c5f2d;
        padding-bottom: 15px;
      }
      
      .buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      
      a, button {
        display: block;
        padding: 15px 30px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }
      
      .btn-primary {
        background-color: #2c5f2d;
        color: white;
      }
      
      .btn-primary:hover {
        background-color: #1e4620;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(44, 95, 45, 0.3);
      }
      
      .btn-secondary {
        background-color: #f0f0f0;
        color: #333;
        border: 2px solid #2c5f2d;
      }
      
      .btn-secondary:hover {
        background-color: #e8e8e8;
        transform: translateY(-2px);
      }
      
      .btn-outline {
        background-color: transparent;
        color: #333;
        border: 2px solid #666;
      }
      
      .btn-outline:hover {
        background-color: #f0f0f0;
      }
      
      .icon {
        font-size: 32px;
        margin-bottom: 10px;
      }
      
      @media (max-width: 768px) {
        .sections {
          grid-template-columns: 1fr;
        }
        
        h1 {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <h1>🥗 Healthy Food Access</h1>
        <p class="subtitle">Find healthy corner stores and manage your dietary preferences</p>
      </div>
      
      <div class="sections">
        <div class="card">
          <h2><div class="icon">👤</div>For Customers</h2>
          <div class="buttons">
            <a href="/signup" class="btn-primary">Sign Up</a>
            <a href="/signin" class="btn-secondary">Sign In</a>
            <a href="/map" class="btn-outline">Browse Map (Guest)</a>
          </div>
        </div>
        
        <div class="card">
          <h2><div class="icon">🏪</div>For Stores</h2>
          <div class="buttons">
            <a href="/store-signup" class="btn-primary">Create Store Account</a>
            <a href="/store-signin" class="btn-secondary">Store Sign In</a>
            <a href="/map" class="btn-outline">View Map</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
