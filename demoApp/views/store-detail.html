<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Store Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="navbar-brand">Healthy Food Access</div>
      <div class="navbar-links">
        <a href="/map">Map</a>
        <a href="/profile">Profile</a>
      </div>
    </div>
    
    <div class="container container-detail">
      <div id="storeMap"></div>
      
      <div class="content">
        <h1 id="storeName"></h1>
        
        <div class="store-info">
          <div class="info-row">
            <span class="info-label">📍 Address:</span>
            <span class="info-value" id="storeAddress"></span>
          </div>
          <div class="info-row">
            <span class="info-label">🏘️ Zip:</span>
            <span class="info-value" id="storeZip"></span>
          </div>
          <div id="badges" class="badges"></div>
        </div>
        
        <div class="products-section">
          <div class="section-title">
            <span>🛒 Available Products</span>
            <a href="#" class="add-product-btn" id="addProductBtn">+ Add Product</a>
          </div>
          
          <div id="productsList"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const storeId = new URLSearchParams(window.location.search).get("id");
      let storeLocation = null;
      
      const map = L.map('storeMap').setView([38.8951, -77.0369], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);
      
      fetch(`/api/stores/${storeId}`)
        .then((res) => res.json())
        .then((data) => {
          storeLocation = data;
          
          document.getElementById("storeName").textContent = data.name;
          document.getElementById("storeAddress").textContent = data.address;
          document.getElementById("storeZip").textContent = data.zipcode || "N/A";
          
          const badges = document.getElementById("badges");
          if (data.snapMatch) badges.innerHTML += '<span class="badge snap-badge">✓ SNAP Match</span>';
          if (data.wicVendor) badges.innerHTML += '<span class="badge wic-badge">✓ WIC Vendor</span>';
          
          // Center map on store and add prominent marker
          map.setView([data.latitude, data.longitude], 15);
          
          // Create custom icon
          const customIcon = L.icon({
            iconUrl: 'data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%232c5f2d" width="48" height="48"><path d="M12 0C8.13 0 5 3.13 5 7c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
            iconSize: [48, 48],
            iconAnchor: [24, 48],
            popupAnchor: [0, -48]
          });
          
          // Add store marker
          L.marker([data.latitude, data.longitude], { icon: customIcon })
            .bindPopup(`<div class="store-marker-popup">${data.name}</div>`)
            .addTo(map)
            .openPopup();
          
          // Add a circle around the store to show coverage area
          L.circle([data.latitude, data.longitude], {
            color: '#2c5f2d',
            fillColor: '#2c5f2d',
            fillOpacity: 0.1,
            radius: 500
          }).addTo(map);
          
          document.getElementById("addProductBtn").href = `/add-product?storeId=${storeId}`;
        });
      
      fetch(`/api/products?storeId=${storeId}`)
        .then((res) => res.json())
        .then((products) => {
          const list = document.getElementById("productsList");
          if (products.length === 0) {
            list.innerHTML = '<div class="no-products">No products listed yet. Click + Add Product to get started!</div>';
            return;
          }
          
          list.innerHTML = products.map(p => `
            <div class="product-item">
              <div class="product-name">${p.name}</div>
              ${p.price ? `<div class="product-price">💰 $${p.price.toFixed(2)}</div>` : ''}
              ${p.allergens && p.allergens.length > 0 ? `
                <div class="allergens">
                  ${p.allergens.map(a => `<span class="allergen-tag">${a}</span>`).join('')}
                </div>
              ` : ''}
            </div>
          `).join('');
        });
    </script>
  </body>
</html>
